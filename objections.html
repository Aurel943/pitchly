<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Pitchly — Objections</title>
<meta name="theme-color" content="#16292C">
<link rel="icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 64 64'%3E%3Crect width='64' height='64' rx='14' fill='%230F1D1F'/%3E%3Ccircle cx='32' cy='32' r='14' fill='%23D6A343'/%3E%3C/svg%3E">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Fraunces:ital,wght@0,400;0,600;1,500;1,600&family=Inter:wght@400;500;600&family=IBM+Plex+Mono:wght@400;500&display=swap" rel="stylesheet">
<link rel="stylesheet" href="style.css">
</head>
<body>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="auth.js"></script>
<script src="starter-content.js"></script>

<nav>
  <div class="wrap">
    <a class="logo" href="dashboard.html"><span class="dot"></span>pitchly</a>
    <div class="nav-tabs">
      <a href="dashboard.html">accueil</a>
      <a href="prospects.html">prospects</a>
      <a href="app.html" class="active">rédiger</a>
    </div>
    <div class="nav-right">
      <!-- affiché dynamiquement par objections.js selon le profil enregistré -->
      <a class="nav-avatar" href="compte.html" title="mon compte">
        <span class="nav-avatar-circle" id="navAvatarInitial">?</span>
        <span class="nav-avatar-name" id="navAvatarName">chargement…</span>
      </a>
      <button class="icon-btn hidden" id="logoutBtn" onclick="handleLogout()" title="déconnexion">⏻</button>
    </div>
  </div>
</nav>

<div class="subnav">
  <div class="wrap">
    <a href="app.html">un message</a>
    <a href="sequences.html">une séquence</a>
    <a href="objections.html" class="active">une réponse à objection</a>
  </div>
</div>

<!-- affiché le temps de résoudre session + profil, retiré par objections.js -->
<div class="page-loader" id="pageLoader"><span class="loader-ring"></span>chargement…</div>

<main id="mainObjections" class="hidden">
  <div class="wrap">

    <header class="page-head">
      <p class="page-kicker">objections</p>
      <h1>Réponds <em>du tac au tac.</em></h1>
    </header>

    <!-- ============ RÉPONDRE À UNE OBJECTION ============ -->
    <div class="card">
      <div class="card-label">
        <span>répondre à une objection</span>
        <span class="quota" id="quotaDisplay">— générations restantes</span>
      </div>

      <div class="field">
        <label>prospect (optionnel)</label>
        <select id="prospectSelect">
          <option value="">— aucun prospect —</option>
        </select>
      </div>

      <div class="field">
        <label>objection du prospect</label>
        <textarea id="objectionInput" placeholder="ex : c'est trop cher pour moi"></textarea>
      </div>

      <div class="field">
        <label>tu ou vous</label>
        <div class="pills" id="adressePills">
          <span class="pill" data-adresse="tu">tutoiement</span>
          <span class="pill active" data-adresse="vous">vouvoiement</span>
        </div>
      </div>

      <button class="btn-primary" id="generateObjectionBtn" onclick="handleGenerateObjection()">
        ✦ générer la réponse
      </button>
    </div>

    <!-- ============ SORTIE ============ -->
    <div class="output-card" id="objectionOutputCard">
      <div class="output-head">
        <span id="objectionOutputMeta">réponse générée</span>
        <div class="output-actions">
          <button class="icon-btn" id="copyObjectionBtn" onclick="handleCopyObjection()" title="copier">⧉</button>
          <button class="icon-btn" id="saveObjectionBtn" onclick="handleSaveObjection()" title="sauvegarder">★</button>
        </div>
      </div>
      <p class="output-text" id="objectionOutputText"></p>
    </div>

    <!-- ============ OBJECTIONS TRAITÉES ============ -->
    <div class="card" id="saved">
      <div class="card-label"><span>mes objections traitées</span></div>
      <div class="saved-toolbar">
        <input type="text" id="savedObjectionsSearchInput" placeholder="rechercher dans mes objections…">
        <select id="savedObjectionsSortSelect">
          <option value="recent">plus récentes</option>
          <option value="oldest">plus anciennes</option>
        </select>
      </div>
      <div id="savedObjectionsList">
        <!-- rempli dynamiquement par objections.js -->
      </div>
    </div>

  </div>
</main>

<!-- ============ MODALE DÉTAIL OBJECTION ============ -->
<div class="modal-overlay hidden" id="objectionModal" data-dismissable>
  <div class="modal modal-wide">
    <div class="modal-head">
      <h3 id="objectionModalQuestion"></h3>
      <button class="icon-btn" onclick="closeObjectionModal()" title="fermer">✕</button>
    </div>
    <span class="tag" id="objectionModalMeta"></span>
    <p class="script-modal-text" id="objectionModalText"></p>
    <div class="modal-actions">
      <button class="icon-btn" onclick="handleCopyObjectionModal()" title="copier">⧉ copier</button>
      <button class="icon-btn" id="objectionModalWorkedBtn" onclick="handleSetObjectionOutcome(currentObjectionId, 'worked')" title="a fonctionné">👍 a fonctionné</button>
      <button class="icon-btn" id="objectionModalFailedBtn" onclick="handleSetObjectionOutcome(currentObjectionId, 'failed')" title="n'a pas fonctionné">👎 n'a pas fonctionné</button>
      <button class="icon-btn danger" onclick="handleDeleteObjection(currentObjectionId, event)" title="supprimer">🗑 supprimer</button>
    </div>
  </div>
</div>

<script src="objections.js"></script>
</body>
</html>
