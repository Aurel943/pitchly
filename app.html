<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>pitchly — mon espace</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Fraunces:ital,wght@0,400;0,600;1,500;1,600&family=Inter:wght@400;500;600&family=IBM+Plex+Mono:wght@400;500&display=swap" rel="stylesheet">
<link rel="stylesheet" href="style.css">
</head>
<body>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="auth.js"></script>

<nav>
  <div class="wrap">
    <a class="logo" href="index.html"><span class="dot"></span>pitchly</a>
    <div class="nav-right">
      <!-- affiché dynamiquement par app.js selon le profil enregistré -->
      <div class="profile-pill" id="profilePill">
        chargement du profil…
      </div>
      <a class="icon-btn" href="dashboard.html" title="dashboard">←</a>
      <a class="icon-btn" href="compte.html" title="mon compte">⚙</a>
      <button class="icon-btn hidden" id="logoutBtn" onclick="handleLogout()" title="déconnexion">⏻</button>
    </div>
  </div>
</nav>

<main id="mainApp" class="hidden">
  <div class="wrap">

    <!-- ============ GÉNÉRATEUR ============ -->
    <div class="card">
      <div class="card-label">
        <span>générer un script</span>
        <span class="quota" id="quotaDisplay">— générations restantes</span>
      </div>

      <div class="field-row">
        <div class="field">
          <label>canal</label>
          <select id="canalSelect">
            <option value="appel">appel téléphonique</option>
            <option value="email">email</option>
            <option value="linkedin">message LinkedIn</option>
          </select>
        </div>
        <div class="field">
          <label>situation</label>
          <select id="situationSelect">
            <option value="premier_contact">premier contact</option>
            <option value="relance">relance</option>
            <option value="closing">closing</option>
          </select>
        </div>
      </div>

      <div class="field">
        <label>contexte (optionnel)</label>
        <textarea id="contexteInput" placeholder="ex : prospect qui a téléchargé mon guide gratuit la semaine dernière"></textarea>
      </div>

      <div class="field">
        <label>ton</label>
        <div class="pills" id="tonePills">
          <span class="pill active" data-tone="direct">direct</span>
          <span class="pill" data-tone="chaleureux">chaleureux</span>
          <span class="pill" data-tone="expert">expert</span>
        </div>
      </div>

      <button class="btn-primary" id="generateBtn" onclick="handleGenerate()">
        ✦ générer le script
      </button>
    </div>

    <!-- ============ SORTIE ============ -->
    <div class="output-card" id="outputCard">
      <div class="output-head">
        <span id="outputMeta">script généré</span>
        <div class="output-actions">
          <button class="icon-btn" id="copyBtn" onclick="handleCopy()" title="copier">⧉</button>
          <button class="icon-btn" id="saveBtn" onclick="handleSave()" title="sauvegarder en favori">★</button>
        </div>
      </div>
      <p class="output-text" id="outputText"></p>
    </div>

    <!-- ============ SCRIPTS SAUVEGARDÉS ============ -->
    <div class="card" id="saved">
      <div class="card-label"><span>mes scripts sauvegardés</span></div>
      <div class="saved-toolbar">
        <input type="text" id="savedSearchInput" placeholder="rechercher dans mes scripts…">
        <select id="savedSortSelect">
          <option value="recent">plus récents</option>
          <option value="oldest">plus anciens</option>
        </select>
      </div>
      <div class="filters" id="savedFilters">
        <span class="filter active" data-filter="tous">tous</span>
        <span class="filter" data-filter="appel">appel</span>
        <span class="filter" data-filter="email">email</span>
        <span class="filter" data-filter="linkedin">linkedin</span>
      </div>
      <div id="savedList">
        <!-- rempli dynamiquement par app.js -->
      </div>
    </div>

    <!-- ============ OBJECTIONS ============ -->
    <div class="card">
      <div class="card-label"><span>objections fréquentes</span></div>
      <div id="objectionsList">
        <!-- rempli dynamiquement par app.js -->
      </div>
    </div>

  </div>
</main>

<!-- ============ MODALE DÉTAIL SCRIPT ============ -->
<div class="modal-overlay hidden" id="scriptModal">
  <div class="modal modal-wide">
    <div class="modal-head">
      <input type="text" class="script-name-input" id="scriptModalName" placeholder="nom du script">
      <button class="icon-btn" onclick="closeScriptModal()" title="fermer">✕</button>
    </div>
    <span class="tag" id="scriptModalMeta"></span>
    <p class="script-modal-text" id="scriptModalText"></p>
    <div class="modal-actions">
      <button class="icon-btn" onclick="handleCopyScriptModal()" title="copier">⧉ copier</button>
      <button class="icon-btn" onclick="handleRenameScriptSubmit()" title="enregistrer le nom">✓ enregistrer le nom</button>
      <button class="icon-btn danger" onclick="handleDeleteScript(currentScriptId)" title="supprimer">🗑 supprimer</button>
    </div>
  </div>
</div>

<script src="app.js"></script>
</body>
</html>
